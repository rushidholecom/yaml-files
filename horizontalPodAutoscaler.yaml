apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: rushi_app
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: myapp
  minReplicas: 1
  maxReplicas: 3
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 50

---
#service.yaml
apiVersion: v1
kind: Service
metadata:
  name: rushi-service
spec:
  selector:
    app: rushi_app
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80